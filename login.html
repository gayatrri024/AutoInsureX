<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AutoInsureX — Login to complete your insurance purchase.">
  <title>Login — AutoInsureX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="aix-navbar">
    <div class="container d-flex align-items-center justify-content-between">
      <a class="navbar-brand" href="index.html">Auto<span>InsureX</span></a>
      <ul class="nav d-none d-md-flex">
        <li><a class="nav-link" href="index.html">Home</a></li>
        <li><a class="nav-link" href="plans.html">Plans</a></li>
        <li><a class="nav-link active" href="login.html">Login</a></li>
      </ul>
    </div>
  </nav>

  <!-- Progress Stepper -->
  <div class="aix-stepper">
    <div class="stepper-track">
      <div class="stepper-step"><div class="stepper-circle">1</div><span class="stepper-label">Register</span></div>
      <div class="stepper-line"></div>
      <div class="stepper-step"><div class="stepper-circle">2</div><span class="stepper-label">Vehicle</span></div>
      <div class="stepper-line"></div>
      <div class="stepper-step"><div class="stepper-circle">3</div><span class="stepper-label">Plans</span></div>
      <div class="stepper-line"></div>
      <div class="stepper-step"><div class="stepper-circle">4</div><span class="stepper-label">Compare</span></div>
      <div class="stepper-line"></div>
      <div class="stepper-step"><div class="stepper-circle">5</div><span class="stepper-label">Login</span></div>
      <div class="stepper-line"></div>
      <div class="stepper-step"><div class="stepper-circle">6</div><span class="stepper-label">Payment</span></div>
      <div class="stepper-line"></div>
      <div class="stepper-step"><div class="stepper-circle">7</div><span class="stepper-label">Upload</span></div>
      <div class="stepper-line"></div>
      <div class="stepper-step"><div class="stepper-circle">8</div><span class="stepper-label">Status</span></div>
    </div>
  </div>

  <!-- Page Content -->
  <main class="aix-page">
    <div class="aix-login-wrapper">
      <div class="aix-card">
        <div style="text-align:center;margin-bottom:1.5rem;">
          <div style="font-size:2.5rem;margin-bottom:0.5rem;">🔒</div>
          <div class="aix-card-header" style="text-align:center;">Welcome Back</div>
          <div class="aix-card-sub" style="text-align:center;">Login to complete your insurance purchase.</div>
        </div>

        <form id="loginForm" autocomplete="off">
          <div class="aix-form-group">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" class="aix-input" placeholder="you@example.com" required>
          </div>

          <div class="aix-form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" class="aix-input" placeholder="Enter your password" required>
          </div>

          <button type="submit" class="aix-btn aix-btn-primary aix-btn-lg aix-btn-block" id="loginSubmitBtn">
            Login & Continue →
          </button>
        </form>

        <p style="text-align:center;margin-top:1rem;font-size:0.8rem;color:var(--text-muted);">
          Demo mode — any email &amp; password will work.
        </p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="aix-footer">
    © 2026 AutoInsureX. All rights reserved. This is an academic demo project.
  </footer>

  <script src="js/dummyData.js"></script>
  <script src="js/script.js"></script>
  <script>initLoginPage();</script>
</body>
</html>
