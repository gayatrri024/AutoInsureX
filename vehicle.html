<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AutoInsureX — Enter your vehicle details to get personalised insurance quotes.">
  <title>Vehicle Details — AutoInsureX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="aix-navbar">
    <div class="container d-flex align-items-center justify-content-between">
      <a class="navbar-brand" href="index.html">Auto<span>InsureX</span></a>
      <ul class="nav d-none d-md-flex">
        <li><a class="nav-link" href="index.html">Home</a></li>
        <li><a class="nav-link" href="plans.html">Plans</a></li>
        <li><a class="nav-link" href="login.html">Login</a></li>
      </ul>
    </div>
  </nav>

  <!-- Progress Stepper -->
  <div class="aix-stepper">
    <div class="stepper-track">
      <div class="stepper-step"><div class="stepper-circle">1</div><span class="stepper-label">Register</span></div>
      <div class="stepper-line"></div>
      <div class="stepper-step"><div class="stepper-circle">2</div><span class="stepper-label">Vehicle</span></div>
      <div class="stepper-line"></div>
      <div class="stepper-step"><div class="stepper-circle">3</div><span class="stepper-label">Plans</span></div>
      <div class="stepper-line"></div>
      <div class="stepper-step"><div class="stepper-circle">4</div><span class="stepper-label">Compare</span></div>
      <div class="stepper-line"></div>
      <div class="stepper-step"><div class="stepper-circle">5</div><span class="stepper-label">Login</span></div>
      <div class="stepper-line"></div>
      <div class="stepper-step"><div class="stepper-circle">6</div><span class="stepper-label">Payment</span></div>
      <div class="stepper-line"></div>
      <div class="stepper-step"><div class="stepper-circle">7</div><span class="stepper-label">Upload</span></div>
      <div class="stepper-line"></div>
      <div class="stepper-step"><div class="stepper-circle">8</div><span class="stepper-label">Status</span></div>
    </div>
  </div>

  <!-- Page Content -->
  <main class="aix-page">
    <div class="container" style="max-width: 580px;">
      <div class="aix-card">
        <div class="aix-card-header">Vehicle Details</div>
        <div class="aix-card-sub">Registration: <strong id="regDisplay">—</strong></div>

        <form id="vehicleForm" autocomplete="off">
          <div class="aix-form-group">
            <label for="vehicleType">Vehicle Type</label>
            <select id="vehicleType" class="aix-input" required>
              <option value="">— Select Type —</option>
              <option value="Car">Car</option>
              <option value="SUV">SUV</option>
              <option value="Sedan">Sedan</option>
              <option value="Hatchback">Hatchback</option>
              <option value="Two-Wheeler">Two-Wheeler</option>
              <option value="Commercial">Commercial Vehicle</option>
            </select>
          </div>

          <div class="aix-form-group">
            <label for="vehicleBrand">Brand / Make</label>
            <select id="vehicleBrand" class="aix-input" required>
              <option value="">— Select Brand —</option>
              <option value="Maruti Suzuki">Maruti Suzuki</option>
              <option value="Hyundai">Hyundai</option>
              <option value="Tata">Tata</option>
              <option value="Mahindra">Mahindra</option>
              <option value="Honda">Honda</option>
              <option value="Toyota">Toyota</option>
              <option value="Kia">Kia</option>
              <option value="MG">MG</option>
              <option value="Skoda">Skoda</option>
              <option value="Volkswagen">Volkswagen</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="aix-form-group">
            <label for="vehicleModel">Model Name</label>
            <input type="text" id="vehicleModel" class="aix-input" placeholder="e.g. Swift, Creta, Nexon" required>
          </div>

          <div class="aix-form-group">
            <label for="vehicleYear">Manufacturing Year</label>
            <select id="vehicleYear" class="aix-input" required>
              <option value="">— Select Year —</option>
              <option value="2026">2026</option>
              <option value="2025">2025</option>
              <option value="2024">2024</option>
              <option value="2023">2023</option>
              <option value="2022">2022</option>
              <option value="2021">2021</option>
              <option value="2020">2020</option>
              <option value="2019">2019</option>
              <option value="2018">2018</option>
              <option value="2017">2017</option>
              <option value="2016">2016</option>
              <option value="2015">2015</option>
              <option value="2014">2014</option>
              <option value="2013">2013</option>
              <option value="2012">2012</option>
              <option value="2011">2011</option>
            </select>
          </div>

          <button type="submit" class="aix-btn aix-btn-primary aix-btn-lg aix-btn-block" id="vehicleSubmitBtn">
            View Insurance Plans →
          </button>
        </form>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="aix-footer">
    © 2026 AutoInsureX. All rights reserved. This is an academic demo project.
  </footer>

  <script src="js/dummyData.js"></script>
  <script src="js/script.js"></script>
  <script>initVehiclePage();</script>
</body>
</html>
